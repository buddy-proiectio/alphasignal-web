name: Publish to Substack

on:
  repository_dispatch:
    types: [publish-substack]

jobs:
  publish-substack:
    name: Publish to Substack
    runs-on: self-hosted
    steps:
      - name: Checkout publish scripts
        uses: actions/checkout@v4

      - name: Download Markdown File from buddy-core
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          FILE_PATH="${{ github.event.client_payload.file_path }}"
          if [ -z "$FILE_PATH" ]; then
            echo "Error: file_path not provided in client_payload"
            exit 1
          fi

          FILE_NAME=$(basename "$FILE_PATH")
          echo "Downloading $FILE_PATH from buddy-core..."

          curl -L -H "Authorization: Bearer $GH_TOKEN" \
               -H "Accept: application/vnd.github.v3.raw" \
               "https://api.github.com/repos/taevel02/buddy-core/contents/$FILE_PATH" \
               -o "$FILE_NAME"

          echo "POST_FILE_PATH=$FILE_NAME" >> $GITHUB_ENV

      - name: Install dependencies
        run: |
          pip3 install --break-system-packages -r requirements.txt
          playwright install chromium

      - name: Publish to Substack
        env:
          POST_FILE_PATH: ${{ env.POST_FILE_PATH }}
        run: |
          mkdir -p substack
          # If local state.json exists, use it. Otherwise, restore from GitHub Secret.
          if [ ! -f substack/state.json ]; then
            echo "Local state.json not found. Restoring from GitHub Secret..."
            echo '${{ secrets.SUBSTACK_STATE_JSON }}' > substack/state.json
          else
            echo "Using existing local state.json to maintain session continuity."
          fi
          python3 substack/publish.py
