<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- Left solar panel array -->
  <rect x="40" y="82" width="130" height="96" rx="12" fill="#0f172a" stroke="#3b82f6" stroke-width="10" />
  <line x1="105" y1="82" x2="105" y2="178" stroke="#3b82f6" stroke-width="6" />
  <line x1="40" y1="130" x2="170" y2="130" stroke="#3b82f6" stroke-width="6" />
  <!-- Connecting arm left -->
  <rect x="170" y="118" width="46" height="24" rx="4" fill="#64748b" />
  
  <!-- Right solar panel array -->
  <rect x="342" y="82" width="130" height="96" rx="12" fill="#0f172a" stroke="#3b82f6" stroke-width="10" />
  <line x1="407" y1="82" x2="407" y2="178" stroke="#3b82f6" stroke-width="6" />
  <line x1="342" y1="130" x2="472" y2="130" stroke="#3b82f6" stroke-width="6" />
  <!-- Connecting arm right -->
  <rect x="296" y="118" width="46" height="24" rx="4" fill="#64748b" />

  <!-- Satellite core body -->
  <circle cx="256" cy="130" r="64" fill="#4f46e5" />
  <circle cx="256" cy="130" r="48" fill="#3b82f6" />
  <circle cx="256" cy="130" r="24" fill="#06b6d4" />
  <circle cx="256" cy="130" r="10" fill="#ffffff" />

  <!-- Antenna dish & emitter at bottom -->
  <rect x="244" y="194" width="24" height="32" rx="4" fill="#64748b" />
  <path d="M190 226 C190 266 322 266 322 226 Z" fill="#475569" stroke="#cbd5e1" stroke-width="6" />
  <line x1="256" y1="246" x2="256" y2="270" stroke="#38bdf8" stroke-width="10" stroke-linecap="round" />

  <!-- Signal waves radiating downwards (fully centered and unclipped) -->
  <path d="M210 295 A 60 60 0 0 0 302 295" stroke="#38bdf8" stroke-width="16" stroke-linecap="round" />
  <path d="M170 340 A 110 110 0 0 0 342 340" stroke="#6366f1" stroke-width="16" stroke-linecap="round" opacity="0.9" />
  <path d="M130 385 A 160 160 0 0 0 382 385" stroke="#3b82f6" stroke-width="14" stroke-linecap="round" opacity="0.6" />
</svg>
